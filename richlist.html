<!doctype html>
<html>
<head>
<title>Rich List — YourCoin Explorer</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; background:#0b0e14; color:#e8e8e8; margin:0; padding:2rem; }
  h1 { color:#4dd0e1; }
  table { width:100%; border-collapse:collapse; background:#151a24; border-radius:10px; }
  th, td { padding:0.6rem 1rem; border-bottom:1px solid #232a38; text-align:left; }
  a { color:#4dd0e1; }
</style>
</head>
<body>
  <h1>Rich List</h1>
  <table>
    <tr><th>#</th><th>Address</th><th>Balance (YRC)</th></tr>
    {% for addr, bal in richlist %}
    <tr><td>{{ loop.index }}</td><td><a href="/explorer/address/{{ addr }}">{{ addr }}</a></td><td>{{ "%.8f"|format(bal) }}</td></tr>
    {% endfor %}
  </table>
  <p><a href="/">&larr; Back to explorer</a></p>
</body>
</html>
